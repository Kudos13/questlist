<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="QuestList">
<meta name="theme-color" content="#0a0a12">
<title>QuestList</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a12;
    --surface: #12121e;
    --surface2: #1a1a2e;
    --border: rgba(100,120,255,0.15);
    --accent: #5b6fff;
    --accent2: #a259ff;
    --gold: #ffd166;
    --green: #06d6a0;
    --red: #ef476f;
    --text: #e8eaf6;
    --muted: #6b7280;
    --glow: rgba(91,111,255,0.3);
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  /* Animated background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse 60% 40% at 20% 10%, rgba(91,111,255,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 30% at 80% 80%, rgba(162,89,255,0.07) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; }

  /* ─── HEADER ─── */
  .header {
    padding: calc(var(--safe-top) + 20px) 20px 0;
    text-align: center;
  }

  .app-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 4px;
  }

  /* ─── RANK CARD ─── */
  .rank-card {
    margin: 16px 16px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .rank-card::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, var(--glow) 0%, transparent 70%);
    pointer-events: none;
  }

  .rank-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 16px;
  }

  .rank-badge {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 4px 20px rgba(91,111,255,0.4);
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }

  .rank-badge.level-up {
    animation: badgePop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes badgePop {
    0% { transform: scale(1); }
    50% { transform: scale(1.3) rotate(-5deg); }
    100% { transform: scale(1); }
  }

  .rank-info { flex: 1; min-width: 0; }

  .rank-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
    margin-bottom: 3px;
  }

  .rank-sub {
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  .xp-label {
    text-align: right;
    font-family: 'Rajdhani', sans-serif;
  }

  .xp-val {
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
  }

  .xp-next { font-size: 11px; color: var(--muted); }

  /* XP Bar */
  .xp-bar-wrap {
    background: rgba(255,255,255,0.06);
    border-radius: 99px;
    height: 10px;
    overflow: hidden;
    position: relative;
  }

  .xp-bar-fill {
    height: 100%;
    border-radius: 99px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    transition: width 0.8s cubic-bezier(0.34,1.2,0.64,1);
    position: relative;
    box-shadow: 0 0 10px rgba(91,111,255,0.6);
  }

  .xp-bar-fill::after {
    content: '';
    position: absolute;
    top: 1px; left: 10%; right: 10%;
    height: 3px;
    background: rgba(255,255,255,0.3);
    border-radius: 99px;
  }

  .xp-bar-shine {
    position: absolute;
    top: 0; left: -60%;
    width: 50%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    border-radius: 99px;
    animation: shine 2s ease infinite;
  }

  @keyframes shine {
    0% { left: -60%; }
    100% { left: 110%; }
  }

  /* Stats row */
  .stats-row {
    display: flex;
    gap: 10px;
    margin: 12px 16px 0;
  }

  .stat-pill {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px;
    text-align: center;
  }

  .stat-val {
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    line-height: 1;
  }

  .stat-val.streak { color: var(--red); }
  .stat-val.done { color: var(--green); }
  .stat-val.total { color: var(--accent); }

  .stat-label { font-size: 10px; color: var(--muted); letter-spacing: 1px; margin-top: 2px; text-transform: uppercase; }

  /* ─── ADD TASK ─── */
  .add-section {
    margin: 14px 16px 0;
    display: flex;
    gap: 8px;
  }

  .task-input {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .task-input::placeholder { color: var(--muted); }

  .task-input:focus {
    border-color: rgba(91,111,255,0.5);
    box-shadow: 0 0 0 3px rgba(91,111,255,0.1);
  }

  .xp-select {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 14px 10px;
    color: var(--gold);
    font-family: 'Rajdhani', sans-serif;
    font-size: 14px;
    font-weight: 600;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
  }

  .add-btn {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 14px;
    width: 50px;
    font-size: 22px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(91,111,255,0.35);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
  }

  .add-btn:active { transform: scale(0.93); box-shadow: 0 2px 8px rgba(91,111,255,0.25); }

  /* ─── FILTERS ─── */
  .filters {
    display: flex;
    gap: 6px;
    margin: 14px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
    padding-bottom: 2px;
  }

  .filters::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 7px 16px;
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.5px;
  }

  .filter-btn.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: transparent;
    color: #fff;
    box-shadow: 0 2px 10px rgba(91,111,255,0.3);
  }

  /* ─── TASK LIST ─── */
  .section-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--muted);
    padding: 14px 16px 6px;
  }

  .task-list { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .task-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 14px 14px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
    cursor: pointer;
    transition: all 0.25s ease;
    animation: slideIn 0.3s cubic-bezier(0.34,1.2,0.64,1);
    position: relative;
    overflow: hidden;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .task-item:active { transform: scale(0.98); }

  .task-item.done-item {
    opacity: 0.5;
    border-color: rgba(6,214,160,0.15);
  }

  .task-item.completing {
    animation: complete 0.5s cubic-bezier(0.34,1.4,0.64,1) forwards;
  }

  @keyframes complete {
    0% { transform: scale(1); }
    40% { transform: scale(1.03); background: rgba(6,214,160,0.08); }
    100% { transform: scale(1); }
  }

  /* Glow stripe on left for priority */
  .task-item::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    border-radius: 3px 0 0 3px;
    background: var(--priority-color, transparent);
  }

  .check-circle {
    width: 26px; height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.25s;
    background: transparent;
  }

  .task-item.done-item .check-circle {
    background: var(--green);
    border-color: var(--green);
  }

  .check-circle .checkmark {
    opacity: 0;
    color: #000;
    font-size: 13px;
    transition: opacity 0.2s;
  }

  .task-item.done-item .check-circle .checkmark { opacity: 1; }

  .task-text-wrap { flex: 1; min-width: 0; }

  .task-text {
    font-size: 15px;
    font-weight: 500;
    line-height: 1.3;
    word-break: break-word;
  }

  .task-item.done-item .task-text { text-decoration: line-through; color: var(--muted); }

  .task-meta {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-top: 3px;
  }

  .xp-badge {
    font-family: 'Rajdhani', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: var(--gold);
    background: rgba(255,209,102,0.1);
    padding: 1px 7px;
    border-radius: 99px;
    border: 1px solid rgba(255,209,102,0.2);
  }

  .task-time {
    font-size: 10px;
    color: var(--muted);
  }

  .delete-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 16px;
    cursor: pointer;
    padding: 6px;
    border-radius: 8px;
    transition: color 0.2s, background 0.2s;
    line-height: 1;
  }

  .delete-btn:active { background: rgba(239,71,111,0.15); color: var(--red); }

  /* ─── EMPTY STATE ─── */
  .empty {
    text-align: center;
    padding: 50px 30px;
    color: var(--muted);
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-title { font-family: 'Rajdhani', sans-serif; font-size: 18px; font-weight: 600; color: var(--text); opacity: 0.4; }
  .empty-sub { font-size: 13px; margin-top: 4px; opacity: 0.6; }

  /* ─── XP POP ─── */
  .xp-pop {
    position: fixed;
    font-family: 'Rajdhani', sans-serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--gold);
    text-shadow: 0 0 20px rgba(255,209,102,0.6);
    pointer-events: none;
    z-index: 999;
    animation: xpFly 1.2s ease forwards;
  }

  @keyframes xpFly {
    0% { opacity: 0; transform: translateY(0) scale(0.7); }
    20% { opacity: 1; transform: translateY(-10px) scale(1.1); }
    80% { opacity: 1; transform: translateY(-50px) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.9); }
  }

  /* ─── LEVEL UP BANNER ─── */
  .lvl-banner {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.7);
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 24px;
    padding: 30px 40px;
    text-align: center;
    z-index: 1000;
    box-shadow: 0 20px 60px rgba(91,111,255,0.5);
    opacity: 0;
    transition: all 0.4s cubic-bezier(0.34,1.4,0.64,1);
    pointer-events: none;
  }

  .lvl-banner.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }

  .lvl-banner-icon { font-size: 48px; margin-bottom: 8px; }
  .lvl-banner-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.8;
  }
  .lvl-banner-rank {
    font-family: 'Rajdhani', sans-serif;
    font-size: 32px;
    font-weight: 700;
    line-height: 1.1;
  }

  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 999;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }

  .overlay.show { opacity: 1; pointer-events: all; }

  /* ─── BOTTOM NAV ─── */
  .bottom-nav {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 10px 20px calc(var(--safe-bottom) + 10px);
    background: rgba(10,10,18,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-around;
    z-index: 100;
  }

  .nav-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Exo 2', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 16px;
    border-radius: 12px;
    transition: all 0.2s;
  }

  .nav-btn.active { color: var(--accent); }
  .nav-btn .nav-icon { font-size: 20px; }

  /* ─── PROGRESS SCREEN ─── */
  .screen { display: none; }
  .screen.active { display: block; }

  .progress-header {
    padding: calc(var(--safe-top) + 20px) 16px 0;
    text-align: center;
  }

  .progress-title {
    font-family: 'Rajdhani', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .rank-ladder { padding: 0 16px; display: flex; flex-direction: column; gap: 8px; }

  .rank-row {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 12px;
    transition: border-color 0.3s;
  }

  .rank-row.current {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px rgba(91,111,255,0.2), 0 4px 20px rgba(91,111,255,0.1);
  }

  .rank-row.achieved { opacity: 0.55; }

  .rank-row-badge { font-size: 28px; width: 40px; text-align: center; }
  .rank-row-info { flex: 1; }
  .rank-row-name {
    font-family: 'Rajdhani', sans-serif;
    font-size: 17px;
    font-weight: 600;
  }
  .rank-row-xp { font-size: 12px; color: var(--muted); }

  .rank-row-check { font-size: 18px; color: var(--green); }
  .rank-row-lock { font-size: 16px; color: var(--muted); }
  .current-tag {
    font-family: 'Rajdhani', sans-serif;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    padding: 3px 10px;
    border-radius: 99px;
    color: #fff;
  }
</style>
</head>
<body>

<div class="overlay" id="overlay"></div>

<div class="lvl-banner" id="lvlBanner">
  <div class="lvl-banner-icon" id="lvlIcon">⚔️</div>
  <div class="lvl-banner-title">Rank Up!</div>
  <div class="lvl-banner-rank" id="lvlName">—</div>
</div>

<div class="app">

  <!-- ── QUESTS SCREEN ── -->
  <div class="screen active" id="screenQuests">
    <div class="header">
      <div class="app-title">⚡ QuestList</div>
    </div>

    <div class="rank-card" id="rankCard">
      <div class="rank-header">
        <div class="rank-badge" id="rankBadge">🥉</div>
        <div class="rank-info">
          <div class="rank-title" id="rankTitle">Bronze Squire</div>
          <div class="rank-sub" id="rankSub">RANK I</div>
        </div>
        <div class="xp-label">
          <div class="xp-val"><span id="xpVal">0</span> XP</div>
          <div class="xp-next">/ <span id="xpNext">150</span></div>
        </div>
      </div>
      <div class="xp-bar-wrap">
        <div class="xp-bar-fill" id="xpBar" style="width:0%">
          <div class="xp-bar-shine"></div>
        </div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat-pill">
        <div class="stat-val done" id="statDone">0</div>
        <div class="stat-label">Completed</div>
      </div>
      <div class="stat-pill">
        <div class="stat-val streak" id="statStreak">🔥0</div>
        <div class="stat-label">Streak</div>
      </div>
      <div class="stat-pill">
        <div class="stat-val total" id="statXPTotal">0</div>
        <div class="stat-label">Total XP</div>
      </div>
    </div>

    <div class="add-section">
      <input class="task-input" id="taskInput" placeholder="Add a new quest…" maxlength="80">
      <select class="xp-select" id="xpSelect">
        <option value="25">⚡25</option>
        <option value="50" selected>⭐50</option>
        <option value="100">💎100</option>
        <option value="200">🏆200</option>
      </select>
      <button class="add-btn" id="addBtn">+</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="all">All</button>
      <button class="filter-btn" data-filter="done">Completed</button>
    </div>

    <div class="section-label" id="sectionLabel">ACTIVE QUESTS</div>
    <div class="task-list" id="taskList"></div>
  </div>

  <!-- ── RANKS SCREEN ── -->
  <div class="screen" id="screenRanks">
    <div class="progress-header">
      <div class="progress-title">🏆 Rank Ladder</div>
    </div>
    <div class="rank-ladder" id="rankLadder"></div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <button class="nav-btn active" id="navQuests" onclick="showScreen('quests')">
    <span class="nav-icon">⚔️</span>Quests
  </button>
  <button class="nav-btn" id="navRanks" onclick="showScreen('ranks')">
    <span class="nav-icon">🏆</span>Ranks
  </button>
</nav>

<script>
// ─── DATA ───────────────────────────────────────────
const RANKS = [
  { name: "Bronze Squire",    icon: "🥉", xp: 0,    label: "RANK I" },
  { name: "Iron Warrior",     icon: "⚔️",  xp: 150,  label: "RANK II" },
  { name: "Silver Knight",    icon: "🛡️",  xp: 400,  label: "RANK III" },
  { name: "Gold Guardian",    icon: "🥇",  xp: 800,  label: "RANK IV" },
  { name: "Platinum Paladin", icon: "💫",  xp: 1500, label: "RANK V" },
  { name: "Diamond Legend",   icon: "💎",  xp: 2500, label: "RANK VI" },
  { name: "Mythic Champion",  icon: "🔥",  xp: 4000, label: "RANK VII" },
  { name: "Eternal Sovereign",icon: "👑",  xp: 6000, label: "RANK VIII" },
];

function getRankIndex(xp) {
  let i = RANKS.length - 1;
  while (i > 0 && xp < RANKS[i].xp) i--;
  return i;
}

// ─── STATE ──────────────────────────────────────────
let state = JSON.parse(localStorage.getItem('qlState') || 'null') || {
  tasks: [], xp: 0, totalXP: 0, streak: 0, done: 0,
  lastDate: null, filter: 'active'
};

function save() { localStorage.setItem('qlState', JSON.stringify(state)); }

// ─── RENDER ─────────────────────────────────────────
function render() {
  const ri = getRankIndex(state.xp);
  const rank = RANKS[ri];
  const next = RANKS[ri + 1];
  const pct = next ? Math.round(((state.xp - rank.xp) / (next.xp - rank.xp)) * 100) : 100;

  document.getElementById('rankBadge').textContent = rank.icon;
  document.getElementById('rankTitle').textContent = rank.name;
  document.getElementById('rankSub').textContent = rank.label;
  document.getElementById('xpVal').textContent = state.xp;
  document.getElementById('xpNext').textContent = next ? next.xp : '∞';
  document.getElementById('xpBar').style.width = Math.min(pct, 100) + '%';
  document.getElementById('statDone').textContent = state.done;
  document.getElementById('statStreak').textContent = '🔥' + state.streak;
  document.getElementById('statXPTotal').textContent = state.totalXP;

  renderTasks();
  renderRankLadder();
}

function renderTasks() {
  const list = document.getElementById('taskList');
  const label = document.getElementById('sectionLabel');
  let tasks = state.tasks;

  if (state.filter === 'active') {
    tasks = tasks.filter(t => !t.done);
    label.textContent = 'ACTIVE QUESTS';
  } else if (state.filter === 'done') {
    tasks = tasks.filter(t => t.done);
    label.textContent = 'COMPLETED QUESTS';
  } else {
    label.textContent = 'ALL QUESTS';
  }

  if (tasks.length === 0) {
    list.innerHTML = `<div class="empty">
      <div class="empty-icon">${state.filter === 'done' ? '🏆' : '⚔️'}</div>
      <div class="empty-title">${state.filter === 'done' ? 'No completed quests yet' : 'No active quests'}</div>
      <div class="empty-sub">${state.filter === 'done' ? 'Complete quests to see them here' : 'Add a quest above to begin'}</div>
    </div>`;
    return;
  }

  list.innerHTML = tasks.map(t => {
    const priorityColor = t.xp >= 200 ? '#a259ff' : t.xp >= 100 ? '#ffd166' : t.xp >= 50 ? '#5b6fff' : '#6b7280';
    return `<div class="task-item ${t.done ? 'done-item' : ''}" 
         style="--priority-color: ${priorityColor}"
         onclick="toggleTask('${t.id}', event)" 
         data-id="${t.id}">
      <div class="check-circle"><span class="checkmark">✓</span></div>
      <div class="task-text-wrap">
        <div class="task-text">${escHtml(t.text)}</div>
        <div class="task-meta">
          <span class="xp-badge">+${t.xp} XP</span>
          <span class="task-time">${t.time}</span>
        </div>
      </div>
      <button class="delete-btn" onclick="deleteTask('${t.id}', event)">🗑</button>
    </div>`;
  }).join('');
}

function renderRankLadder() {
  const ri = getRankIndex(state.xp);
  const ladder = document.getElementById('rankLadder');
  ladder.innerHTML = RANKS.map((r, i) => {
    const achieved = state.xp >= r.xp;
    const current = i === ri;
    return `<div class="rank-row ${current ? 'current' : ''} ${achieved && !current ? 'achieved' : ''}">
      <div class="rank-row-badge">${r.icon}</div>
      <div class="rank-row-info">
        <div class="rank-row-name">${r.name}</div>
        <div class="rank-row-xp">${r.xp} XP required</div>
      </div>
      ${current ? '<span class="current-tag">YOU</span>' : achieved ? '<span class="rank-row-check">✓</span>' : '<span class="rank-row-lock">🔒</span>'}
    </div>`;
  }).join('');
}

// ─── ACTIONS ────────────────────────────────────────
function addTask() {
  const input = document.getElementById('taskInput');
  const text = input.value.trim();
  if (!text) { input.focus(); return; }
  const xp = parseInt(document.getElementById('xpSelect').value);
  state.tasks.unshift({
    id: Date.now().toString(),
    text, xp, done: false,
    time: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})
  });
  input.value = '';
  save(); render();
}

function toggleTask(id, e) {
  if (e.target.classList.contains('delete-btn')) return;
  const t = state.tasks.find(t => t.id === id);
  if (!t || t.done) return;

  const el = document.querySelector(`[data-id="${id}"]`);
  if (el) el.classList.add('completing');

  setTimeout(() => {
    const prevRank = getRankIndex(state.xp);
    t.done = true;
    state.xp += t.xp;
    state.totalXP += t.xp;
    state.done++;
    updateStreak();
    save();

    const newRank = getRankIndex(state.xp);
    if (newRank > prevRank) showLevelUp(newRank);

    spawnXPPop(e, t.xp);
    render();
  }, 300);
}

function deleteTask(id, e) {
  e.stopPropagation();
  state.tasks = state.tasks.filter(t => t.id !== id);
  save(); render();
}

function updateStreak() {
  const today = new Date().toDateString();
  if (state.lastDate === today) return;
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  state.streak = (state.lastDate === yesterday) ? state.streak + 1 : 1;
  state.lastDate = today;
}

// ─── XP POP ─────────────────────────────────────────
function spawnXPPop(e, xp) {
  const pop = document.createElement('div');
  pop.className = 'xp-pop';
  pop.textContent = `+${xp} XP`;
  const x = e.clientX || window.innerWidth / 2;
  const y = e.clientY || window.innerHeight / 2;
  pop.style.left = (x - 30) + 'px';
  pop.style.top = (y - 20) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 1300);
}

// ─── LEVEL UP ───────────────────────────────────────
function showLevelUp(ri) {
  const rank = RANKS[ri];
  document.getElementById('lvlIcon').textContent = rank.icon;
  document.getElementById('lvlName').textContent = rank.name;
  const banner = document.getElementById('lvlBanner');
  const overlay = document.getElementById('overlay');
  banner.classList.add('show');
  overlay.classList.add('show');
  document.getElementById('rankBadge').classList.add('level-up');
  setTimeout(() => { document.getElementById('rankBadge').classList.remove('level-up'); }, 600);
  setTimeout(() => {
    banner.classList.remove('show');
    overlay.classList.remove('show');
  }, 2800);
  overlay.onclick = () => {
    banner.classList.remove('show');
    overlay.classList.remove('show');
  };
}

// ─── FILTERS ────────────────────────────────────────
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    state.filter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    save(); render();
  });
});

// ─── INPUT ──────────────────────────────────────────
document.getElementById('addBtn').addEventListener('click', addTask);
document.getElementById('taskInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addTask();
});

// ─── NAVIGATION ─────────────────────────────────────
function showScreen(which) {
  document.getElementById('screenQuests').classList.toggle('active', which === 'quests');
  document.getElementById('screenRanks').classList.toggle('active', which === 'ranks');
  document.getElementById('navQuests').classList.toggle('active', which === 'quests');
  document.getElementById('navRanks').classList.toggle('active', which === 'ranks');
}

// ─── UTILS ──────────────────────────────────────────
function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ───────────────────────────────────────────
render();
</script>
</body>
</html>
