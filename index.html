<script>
/* ============================================================
   QUESTLIST — UPDATED (move + bottom add)
   ============================================================ */

var RANKS = [
  { name:'Bronze Squire', icon:'🥉', xp:0, sub:'RANK I' },
  { name:'Iron Warrior', icon:'⚔️', xp:150, sub:'RANK II' },
  { name:'Silver Knight', icon:'🛡️', xp:400, sub:'RANK III' },
  { name:'Gold Guardian', icon:'🥇', xp:800, sub:'RANK IV' },
  { name:'Platinum Paladin', icon:'💫', xp:1500, sub:'RANK V' },
  { name:'Diamond Legend', icon:'💎', xp:2500, sub:'RANK VI' },
  { name:'Mythic Champion', icon:'🔥', xp:4000, sub:'RANK VII' },
  { name:'Eternal Sovereign', icon:'👑', xp:6000, sub:'RANK VIII' }
];

var SWATCHES = ['#6070ff','#a855f7','#10b981','#f43f5e','#f97316','#fbbf24','#06b6d4','#ec4899'];

var pickedColor = SWATCHES[0];
var currentFilter = 'active';
var currentGrp = 'all';

function defaultState() {
  return { username:'', tasks:[], groups:[], xp:0, totalXP:0, done:0, streak:0, lastDate:null };
}

var S = JSON.parse(localStorage.getItem('qlv5')) || defaultState();
function persist(){ localStorage.setItem('qlv5', JSON.stringify(S)); }

function get(id){ return document.getElementById(id); }

/* =========================
   ADD TASK (NOW TO BOTTOM)
   ========================= */
function doAddTask() {
  var txt = get('taskText').value.trim();
  if (!txt) return;

  var xp  = parseInt(get('xpPick').value,10) || 50;
  var grp = get('grpPick').value || null;
  var due = get('duePick').value || null;

  // ✅ push instead of unshift
  S.tasks.push({
    id: String(Date.now()),
    text: txt,
    xp: xp,
    done: false,
    groupId: grp,
    due: due
  });

  get('taskText').value = '';
  get('duePick').value = '';

  persist();
  drawTasks();
}

/* =========================
   MOVE TASK
   ========================= */
function moveTask(id, dir){
  var i = S.tasks.findIndex(t => t.id === id);
  if(i === -1) return;

  var ni = i + dir;
  if(ni < 0 || ni >= S.tasks.length) return;

  var temp = S.tasks[i];
  S.tasks[i] = S.tasks[ni];
  S.tasks[ni] = temp;

  persist();
  drawTasks();
}

/* =========================
   DRAW TASKS (NO SORT)
   ========================= */
function drawTasks(){
  var tasks = S.tasks.slice();

  if(currentFilter==='active') tasks = tasks.filter(t=>!t.done);
  if(currentFilter==='done') tasks = tasks.filter(t=>t.done);

  if(!tasks.length){
    get('taskList').innerHTML = '<div class="empty-state">No quests</div>';
    return;
  }

  var html='';

  tasks.forEach(function(t){

    html += `
    <div class="task" data-id="${t.id}">
      <div class="check">${t.done?'✓':''}</div>

      <div class="task-body">
        <div class="task-text">${t.text}</div>
        <div class="task-meta">
          <span class="xp-tag">+${t.xp} XP</span>
        </div>
      </div>

      <button class="del-btn" data-up="${t.id}">⬆️</button>
      <button class="del-btn" data-down="${t.id}">⬇️</button>
      <button class="del-btn" data-del="${t.id}">🗑</button>
    </div>
    `;
  });

  get('taskList').innerHTML = html;

  /* =========================
     CLICK HANDLER
     ========================= */
  get('taskList').onclick = function(e){

    var up = e.target.closest('[data-up]');
    if(up){
      e.stopPropagation();
      moveTask(up.dataset.up,-1);
      return;
    }

    var down = e.target.closest('[data-down]');
    if(down){
      e.stopPropagation();
      moveTask(down.dataset.down,1);
      return;
    }

    var del = e.target.closest('[data-del]');
    if(del){
      e.stopPropagation();
      S.tasks = S.tasks.filter(t=>t.id !== del.dataset.del);
      persist();
      drawTasks();
      return;
    }

    var row = e.target.closest('[data-id]');
    if(row){
      var t = S.tasks.find(x=>x.id===row.dataset.id);
      if(t){
        t.done = !t.done;
        persist();
        drawTasks();
      }
    }
  };
}

/* =========================
   INIT
   ========================= */
get('addTaskBtn').onclick = doAddTask;
get('taskText').onkeydown = e => { if(e.key==='Enter') doAddTask(); };

drawTasks();
</script>
